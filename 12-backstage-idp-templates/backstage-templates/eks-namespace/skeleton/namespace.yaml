apiVersion: v1
kind: Namespace
metadata:
  name: ${{ values.namespaceName }}
  labels:
    team: ${{ values.team }}
    managed-by: backstage
---
apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  namespace: ${{ values.namespaceName }}
spec:
  limits:
    - default:
        cpu: ${{ values.cpuLimit }}
        memory: ${{ values.memoryLimit }}
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      type: Container
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-external-ingress
  namespace: ${{ values.namespaceName }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ${{ values.namespaceName }}
