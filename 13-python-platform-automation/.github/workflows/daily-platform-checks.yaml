name: Daily Platform Health Checks

on:
  schedule:
    - cron: '30 2 * * *'   # 8:00 AM IST
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  aws-stale-resources:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r 13-python-platform-automation/requirements.txt
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/platform-automation-role
          aws-region: ap-south-1
      - name: Stale resource report
        run: |
          python 13-python-platform-automation/scripts/aws_stale_resources.py \
            --region ap-south-1 \
            --slack-webhook ${{ secrets.SLACK_WEBHOOK_URL }}

  k8s-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r 13-python-platform-automation/requirements.txt
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/platform-automation-role
          aws-region: ap-south-1
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name vivek-eks-prod --region ap-south-1
      - name: K8s health report
        run: |
          python 13-python-platform-automation/scripts/k8s_health_report.py \
            --slack-webhook ${{ secrets.SLACK_WEBHOOK_URL }}
